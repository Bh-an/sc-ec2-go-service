name: deploy-terraform (disabled)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (uses GitHub Environments)
        type: choice
        required: true
        options: [dev, stage]
      docker_image:
        description: Full image ref, e.g. ghcr.io/bh-an/ec2-go-service@sha256:...
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEFAULT_AWS_REGION: ap-south-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ false }} # intentionally disabled; use local operator flows instead
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: terraform-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION || env.DEFAULT_AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Resolve image reference
        id: image
        run: |
          IMAGE_REF="$(./scripts/resolve-image.sh "${{ inputs.docker_image }}")"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Terraform apply
        env:
          BACKEND: s3
        run: ./scripts/deploy-terraform.sh "${{ inputs.environment }}" "${{ steps.image.outputs.image_ref }}"
