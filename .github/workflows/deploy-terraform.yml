name: deploy-terraform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (uses GitHub Environments)
        type: choice
        required: true
        options: [dev, stage]
      docker_image:
        description: Full image ref, e.g. ghcr.io/bh-an/ec2-go-service@sha256:...
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: terraform-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Ensure shared repos token is configured
        run: test -n "${{ secrets.SHARED_REPOS_TOKEN }}"

      - name: Configure token-based access for shared repos
        run: git config --global url."https://x-access-token:${{ secrets.SHARED_REPOS_TOKEN }}@github.com/".insteadOf https://github.com/

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var-file="environments/${{ inputs.environment }}.tfvars" \
            -var="docker_image=${{ inputs.docker_image }}"
