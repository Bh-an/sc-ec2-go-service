name: deploy-cdk (disabled)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (uses GitHub Environments)
        type: choice
        required: true
        options: [dev, stage]
      docker_image:
        description: Full image ref (prefer digest), e.g. ghcr.io/bh-an/ec2-go-service@sha256:...
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEFAULT_AWS_REGION: ap-south-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ false }} # intentionally disabled; use local operator flows instead
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: cdk-${{ inputs.environment }}
      cancel-in-progress: false
    env:
      DEPLOY_ENV: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: infra/cdk/go.mod
          cache-dependency-path: infra/cdk/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION || env.DEFAULT_AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Install CDK CLI
        run: npm install -g aws-cdk@2

      - name: Resolve image reference
        id: image
        run: |
          IMAGE_REF="$(./scripts/resolve-image.sh "${{ inputs.docker_image }}")"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Deploy stack
        env:
          DOCKER_IMAGE: ${{ steps.image.outputs.image_ref }}
        run: ./scripts/deploy-cdk.sh "${{ inputs.environment }}" "${{ steps.image.outputs.image_ref }}"
