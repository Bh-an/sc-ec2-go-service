name: deploy-cdk

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (uses GitHub Environments)
        type: choice
        required: true
        options: [dev, stage]
      docker_image:
        description: Full image ref (prefer digest), e.g. ghcr.io/bh-an/ec2-go-service@sha256:...
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: cdk-${{ inputs.environment }}
      cancel-in-progress: false
    env:
      DOCKER_IMAGE: ${{ inputs.docker_image }}
      DEPLOY_ENV: ${{ inputs.environment }}
      GOPRIVATE: github.com/Bh-an/*
      GONOSUMDB: github.com/Bh-an/*
    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key for shared repos
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SHARED_REPOS_SSH_KEY }}

      - name: Trust GitHub SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Rewrite GitHub module fetches to SSH
        run: git config --global url."ssh://git@github.com/".insteadOf https://github.com/

      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/cdk/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Build Go CDK app
        working-directory: infra/cdk
        run: go build .

      - name: CDK synth
        working-directory: infra/cdk
        run: cdk synth

      - name: Deploy stack
        working-directory: infra/cdk
        run: cdk deploy --require-approval never
