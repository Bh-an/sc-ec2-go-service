name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: Run app tests
        working-directory: app
        run: go test ./...

      - name: Build app binary
        working-directory: app
        run: go build ./cmd/server

      - name: Build application image
        run: docker build -t ghcr.io/bh-an/ec2-go-service:test ./app

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure shared repos token is configured
        run: test -n "${{ secrets.SHARED_REPOS_TOKEN }}"

      - name: Configure token-based access for shared repos
        run: git config --global url."https://x-access-token:${{ secrets.SHARED_REPOS_TOKEN }}@github.com/".insteadOf https://github.com/

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Verify environment files exist
        working-directory: infra/terraform
        run: |
          test -f environments/dev.tfvars
          test -f environments/stage.tfvars

  cdk:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/Bh-an/*
      GONOSUMDB: github.com/Bh-an/*
    steps:
      - uses: actions/checkout@v4

      - name: Ensure shared repos token is configured
        run: test -n "${{ secrets.SHARED_REPOS_TOKEN }}"

      - name: Configure token-based access for shared repos
        run: git config --global url."https://x-access-token:${{ secrets.SHARED_REPOS_TOKEN }}@github.com/".insteadOf https://github.com/

      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/cdk/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install CDK CLI
        run: npm install -g aws-cdk@2

      - name: Build Go CDK app
        working-directory: infra/cdk
        run: go build .

      - name: CDK synth (dev)
        working-directory: infra/cdk
        env:
          DEPLOY_ENV: dev
          DOCKER_IMAGE: ghcr.io/bh-an/ec2-go-service:test
        run: cdk synth

      - name: CDK synth (stage)
        working-directory: infra/cdk
        env:
          DEPLOY_ENV: stage
          DOCKER_IMAGE: ghcr.io/bh-an/ec2-go-service:test
        run: cdk synth
