name: test

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Run app tests
        working-directory: app
        run: go test ./...

      - name: Build app binary
        working-directory: app
        run: go build ./cmd/server

      - name: Build application image
        run: docker build -t ghcr.io/bh-an/ec2-go-service:test ./app

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Verify environment files exist
        working-directory: infra/terraform
        run: |
          test -f environments/dev.tfvars
          test -f environments/stage.tfvars

  cdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: infra/cdk/go.mod
          cache-dependency-path: infra/cdk/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install CDK CLI
        run: npm install -g aws-cdk@2

      - name: Build Go CDK app
        working-directory: infra/cdk
        run: go build .

      - name: CDK synth (dev)
        working-directory: infra/cdk
        env:
          DEPLOY_ENV: dev
          DOCKER_IMAGE: ghcr.io/bh-an/ec2-go-service:test
        run: cdk synth

      - name: CDK synth (stage)
        working-directory: infra/cdk
        env:
          DEPLOY_ENV: stage
          DOCKER_IMAGE: ghcr.io/bh-an/ec2-go-service:test
        run: cdk synth
